name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        montoya: ["2024.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Tests
        run: ./gradlew test --no-daemon --console=plain -PmontoyaVersion=${{ matrix.montoya }}

      - name: Build shadow jar
        run: ./gradlew shadowJar --no-daemon --console=plain -PmontoyaVersion=${{ matrix.montoya }}

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: burp-mcp-ultimate-${{ matrix.montoya }}
          path: build/libs/burp-mcp-ultimate-*.jar
          if-no-files-found: error
